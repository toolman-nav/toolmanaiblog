<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="工具人AI导航是一个面向中文用户的 AI 工具与教程导航站，帮助你更快发现工具、学习方法、形成工作流。"
    />
    <title>工具人AI导航 - AI工具与教程导航站</title>
    <link
      rel="icon"
      href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%231677ff"/><text x="32" y="42" font-size="34" text-anchor="middle" font-family="Arial" font-weight="800" fill="white">A</text></svg>'
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="#home" aria-label="工具人AI导航主页" data-tab-target="home">
          <span class="brand-mark" aria-hidden="true">A</span>
          <span class="brand-name">工具人AI导航</span>
        </a>

        <nav class="top-nav" aria-label="主导航">
          <button class="nav-link is-active" type="button" data-tab="home">主页</button>
          <button class="nav-link" type="button" data-tab="tools">AI导航</button>
          <button class="nav-link" type="button" data-tab="tutorials">AI教程</button>
          <button class="nav-link" type="button" data-tab="about">关于我们</button>
        </nav>

        <form class="header-actions" data-global-search role="search" aria-label="全站搜索">
          <label class="header-search">
            <span class="search-icon" aria-hidden="true"></span>
            <input id="globalSearch" name="globalSearch" type="search" placeholder="搜索文章、工具和教程" />
          </label>
          <button class="search-submit-button" type="submit">搜索</button>
        </form>
      </div>
    </header>

    <main id="app" class="app-shell" tabindex="-1"></main>

    <script src="app.js"></script>
  </body>
</html>
